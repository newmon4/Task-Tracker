<!DOCTYPE html>
<html>
<head>
    <title>Task Tracker</title>
</head>
<body>
    <h1>Task Tracker</h1>
    <input id="ControllerURL" placeholder="Enter the URL" />
    <button onclick="chooseTheURL()">Add</button>
    <input id="taskInput" placeholder="Enter Your Task"/>
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>


    <script>

        let url = "";

         function chooseTheURL() {
             url = document.getElementById("ControllerURL").value;
            loadTasks
        }
        
        async function loadTasks() {
            const res = await fetch(url);
            const data = await res.json();

            const list = document.getElementById("taskList");
            list.innerHTML = ""
            data.forEach(task => {
                const li = document.createElement("li");
                li.textContent = task;
                list.appendChild(lis);
            })
        }

        async function addTask() {
            const value = document.getElementById("taskInput").value;
            await fetch(url + `/add?task=${value}`);
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
