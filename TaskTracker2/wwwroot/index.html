<!DOCTYPE html>
<html>
<head>
    <title>Task Tracker</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="input-section">
        <h1>Task Tracker</h1>
        <h3>Toggle the checkbox to enable a personal URL(endpoint)</h3>

        <label>
            <input type="checkbox" id="toggleEdit" onchange="toggleFields()" title="Allow to change URL">
        </label>

        <p></p>

        <input id="ControllerURL" placeholder="https://localhost:xxxx" disabled />
        <button id="urlChangeButton" onclick="chooseTheURL()" disabled>Add</button>
        <p></p>
        <input id="taskInput" placeholder="Enter Your Task" />
        <button onclick="addTask()">Add</button>
        <p></p>
        <!--<a href="/tasks">View all tasks</a>-->
    </div>

   <!----<div class="tasks-section">-->
        <ul id="taskList"></ul>
    <!-----</div>-->

    
    <script>

        function toggleFields() {
            const enabled = document.getElementById("toggleEdit").checked;

            document.getElementById("ControllerURL").disabled = !enabled;
            document.getElementById("urlChangeButton").disabled = !enabled;
        }

        let url = "/tasks";

        function chooseTheURL() {
            url = document.getElementById("ControllerURL").value;
            loadTasks();
        }

        function getUrl() {
            return url || "";
        }

        async function loadTasks() {
            const res = await fetch(url);
            const data = await res.json();

            const list = document.getElementById("taskList");
            list.innerHTML = ""
            data.forEach(task => {
                const li = document.createElement("li");
                li.textContent = task.name;
                li.className = "task";
                list.appendChild(li);
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Delete Task";
                deleteButton.className = "delete-btn";
                deleteButton.onclick = () => deleteTask(task.id);
                li.appendChild(deleteButton);
                const editButton = document.createElement("button");
                editButton.textContent = "Edit Task";
                editButton.className = "edit-btn";
                editButton.onclick = () => UIeditTask(task.id, task.name);
                li.appendChild(editButton);

            })
        }

        async function addTask() {
            const value = document.getElementById("taskInput").value;
            const task = {
                name: value
            }
            await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(task)
            });

            
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(url + `/${id}`, {
                method: "DELETE"
            });
                //headers: {
                   // "Content-Type": "application/json"
              //  },
               // body: JSON.stringify(task)
            loadTasks();
        }

        async function UIeditTask(id, name) {
            const newName = prompt("Edit Task", name);
            editTask(id, newName)
            
        }

        async function editTask(id, newName) {
            const task = {
                name: newName
            };
            console.log(id, newName)
            await fetch(url + `/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(task)
            });

            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
