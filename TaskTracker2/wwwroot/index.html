<!DOCTYPE html>
<html>
<head>
    <title>Task Tracker</title>
</head>
<body>
    <h1>Task Tracker</h1>
    <h3>Toggle the checkbox to enable a personal URL(endpoint)</h3>

    <label>
        <input type="checkbox" id="toggleEdit" onchange="toggleFields()" title="Allow to change URL">
    </label>

    <p></p>

    <input id="ControllerURL" placeholder="https://localhost:xxxx" disabled/>
    <button id="urlChangeButton" onclick="chooseTheURL()" disabled>Add</button>
    <p></p>
    <input id="taskInput" placeholder="Enter Your Task" />
    <button onclick="addTask()">Add</button>
    <p></p>
    <!--<a href="/tasks">View all tasks</a>-->

    <ul id="taskList"></ul>

    
    <script>

        function toggleFields() {
            const enabled = document.getElementById("toggleEdit").checked;

            document.getElementById("ControllerURL").disabled = !enabled;
            document.getElementById("urlChangeButton").disabled = !enabled;
        }

        let url = "/tasks";

        function chooseTheURL() {
            url = document.getElementById("ControllerURL").value;
            loadTasks();
        }

        function getUrl() {
            return url || "";
        }

        async function loadTasks() {
            const res = await fetch(url);
            const data = await res.json();

            const list = document.getElementById("taskList");
            list.innerHTML = ""
            data.forEach(task => {
                const li = document.createElement("li");
                li.textContent = task.name;
                list.appendChild(li);
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Delete Task";
                deleteButton.onclick = () => deleteTask(task.id);
                li.appendChild(deleteButton);
                const editeButton = document.createElement("button");
                editeButton.textContent = "Edite Task";
                editeButton.onclick = () => editTask(task.id, task.name);
                li.appendChild(editeButton);

            })
        }

        async function addTask() {
            const value = document.getElementById("taskInput").value;
            const task = {
                name: value
            }
            await fetch(url + `/add`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(task)
            });

            
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(url + `/delete/${id}`, {
                method: "DELETE"
            });
                //headers: {
                   // "Content-Type": "application/json"
              //  },
               // body: JSON.stringify(task)
            loadTasks();
        }

        async function editTask(id, name) {
            const newName = prompt("Edite Task", name);
            
        }

        loadTasks();
    </script>
</body>
</html>
